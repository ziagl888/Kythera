# Kythera pre-commit hooks.
# Setup (once):  pip install pre-commit  &&  pre-commit install
# Run manually:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        # Models (~7 MB) are committed on purpose; block anything genuinely huge
        # (e.g. the 98 MB 1minute.json runtime dump).
        args: ["--maxkb=10240"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Secret / PII scanning — blocks bot tokens AND hardcoded private Telegram
  # channel ids (-100XXXXXXXXXX). This is the guard that would have caught the
  # ~30 leaked channel ids we centralized into config.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.3
    hooks:
      - id: gitleaks
