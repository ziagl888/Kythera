# Kythera pre-commit hooks.
# Setup (once):  pip install pre-commit  &&  pre-commit install
# Run manually:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        # Models (~7 MB) are committed on purpose; block anything genuinely huge
        # (e.g. the 98 MB 1minute.json runtime dump).
        args: ["--maxkb=10240"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Secret / PII scanning — blocks bot tokens AND hardcoded private Telegram
  # channel ids (-100XXXXXXXXXX). This is the guard that would have caught the
  # ~30 leaked channel ids we centralized into config.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.3
    hooks:
      - id: gitleaks

  # Indicator regression guard (Phase 1, T-2026-CU-9050-009). Recomputes the
  # ~108 indicators from frozen OHLCV fixtures and compares to an immutable
  # golden snapshot — blocks any commit that drifts the live signal path.
  # Passes as a no-op until the golden snapshot is frozen (see tools/
  # regression_guard/README.md). Runs on every commit, no operator habit needed.
  - repo: local
    hooks:
      - id: kythera-indicator-regression-guard
        name: Kythera indicator regression guard
        entry: python tools/regression_guard/guard.py verify
        language: system
        pass_filenames: false
        always_run: true

      # Finding-ID guard (T-2026-CU-9050-059). Parallel sessions each read the
      # ledger, took what looked like the next free number and wrote it back —
      # three findings ended up as P1.46 (renumbered by hand in PR #36). This
      # catches the collision at commit time instead of in review. Fails open on
      # a missing AUDIT_TODO.md.
      - id: kythera-finding-id-guard
        name: Kythera AUDIT_TODO finding-id guard
        entry: python tools/audit/finding_ids.py check
        language: system
        pass_filenames: false
        always_run: true
